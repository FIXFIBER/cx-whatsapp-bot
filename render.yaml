# Render deploy manifest — ONE service runs the bot AND serves the web client.
# The bot is STATEFUL (persistent WhatsApp socket + Baileys session), so it must
# run on a long-lived server with a persistent disk. The web client is served by
# the bot itself at /app, so there is NO separate frontend host and NO custom domain
# required.
services:
  - type: web
    name: cx-whatsapp-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # Starter (paid) stays awake; the free plan spins down and kills the WhatsApp socket
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "3001"
      - key: DATA_DIR
        value: "/data"      # persistent disk mount (see disks below)
      # PUBLIC_URL auto-defaults to Render's RENDER_EXTERNAL_URL, so the
      # invite/share QR works with zero config. Override only if you put a
      # custom domain (e.g. cx.fob.net.ng) in front of this service.
      - key: PUBLIC_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    # Persistent disk: keeps the WhatsApp session + device registry across
    # deploys/restarts. WITHOUT this, every deploy re-scans the QR and you
    # lose the link.
    disks:
      - name: cx-data
        mountPath: /data
        sizeGB: 1

# Build/start are defined in Dockerfile (npm ci && npm start).
